<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ExorcistGame2046 — запуск</title>
<style>
html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#071013;color:#d9eee8;font:16px/1.5 Consolas,monospace}.box{max-width:680px;padding:24px;border:1px solid #3b6058;background:#0a171a}b{color:#6ff2d8}pre{white-space:pre-wrap;color:#ff9aa8}
</style>
</head>
<body>
<div class="box" id="status"><b>EXORCIST GAME 2046</b><p>Восстанавливаю 3D-ядро и запускаю игру…</p></div>
<script>
(async()=>{
  const status=document.getElementById('status');
  try{
    const response=await fetch('./index.html',{cache:'no-store'});
    if(!response.ok)throw new Error('index.html: HTTP '+response.status);
    let html=await response.text();

    const marker='function useTool(n){';
    const core=`const player={x:0,y:1.7,z:4,yaw:0,pitch:0,vx:0,vz:0,crouch:false,sceneSpawn:null};
const keys={}, touchMove={x:0,y:0};
function box(x,y,z,sx,sy,sz,color=C.wall,opt={}){const e={x,y,z,sx,sy,sz,color,solid:opt.solid!==false,tag:opt.tag||'',label:opt.label||'',interact:opt.interact||null,em:opt.em||0,ry:opt.ry||0,hidden:false};W.push(e);return e}
function npc(x,z,type,label,opt={}){const n={x,z,y:0,type,label,dir:opt.dir||0,patrol:opt.patrol||null,speed:opt.speed||1,phase:Math.random()*6.28,hostile:false,hidden:false};NPC.push(n);return n}
function clearWorld(){W=[];NPC=[];near=null}
function roomShell(w,d,h,color=C.wall){box(0,-.15,0,w,.3,d,C.floor,{solid:false});box(0,h,0,w,.25,d,C.dark);box(-w/2,h/2,0,.25,h,d,color);box(w/2,h/2,0,.25,h,d,color);box(0,h/2,-d/2,w,h,.25,color);box(0,h/2,d/2,w,h,.25,color)}
function buildCity(){scene='city';clearWorld();box(0,-.3,0,140,.6,140,[.11,.14,.13],{solid:false});player.x=-53;player.z=34;player.yaw=0;objective('Добраться до центра города')}
function buildMission(){scene='mission';clearWorld();roomShell(18,18,4.5,[.3,.27,.23]);player.x=0;player.z=6.8;player.yaw=0;objective('Осмотреть квартиру архитектора')}
`;

    if(!html.includes('const player={x:0,y:1.7,z:4')){
      if(!html.includes(marker))throw new Error('Не найдено место внедрения 3D-ядра.');
      html=html.replace(marker,core+marker);
    }

    html=html
      .replace('player.x=-1.4;player.z=5.7;player.yaw=.22;','player.x=-4.6;player.z=6.0;player.yaw=0;')
      .replace('player.x=-1.5;player.z=6.6;player.yaw=.16;','player.x=-7.2;player.z=6.4;player.yaw=0;');

    document.open();
    document.write(html);
    document.close();
  }catch(error){
    status.innerHTML='<b>ЗАПУСК НЕ УДАЛСЯ</b><pre>'+String(error.stack||error)+'</pre><p>Убедитесь, что игра открыта через локальный сервер, а не двойным кликом по play.html.</p>';
  }
})();
</script>
</body>
</html>
